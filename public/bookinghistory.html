<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Bookings - BlueHorizon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="style.css">

    <style>
        .booking-card {
            transition: transform 0.2s;
        }

        .booking-card:hover {
            transform: translateY(-2px);
        }

        .status-badge {
            font-size: 0.8rem;
            padding: 0.35rem 0.75rem;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <img src="logo2.png" alt="" class="logo-img">
            <a class="navbar-brand fw-bold" href="index.html">BlueHorizon Air Services</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="searchflight.html">Flights</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="bookinghistory.html">My Bookings</a>
                    </li>
                    <!-- Dynamic login/logout buttons -->
                    <li class="nav-item" id="loginNav">
                        <a class="nav-link" href="login.html">Login</a>
                    </li>
                    <li class="nav-item" id="registerNav">
                        <a class="nav-link" href="register.html">Register</a>
                    </li>
                    <!-- Logout button will be inserted here by JavaScript -->
                    <li class="nav-item">
                        <a class="nav-link" href="admin-login.html">Admin Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- BOOKINGS SECTION -->
    <section class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="mb-0">
                <i class="bi bi-calendar-check me-2"></i>My Booking History
            </h3>
            <div>
                <span class="badge bg-light text-dark border">
                    <i class="bi bi-person-circle me-1"></i> User ID: <span id="currentUserID">1</span>
                </span>
                <button class="btn btn-outline-primary btn-sm ms-2" onclick="loadBookingHistory()">
                    <i class="bi bi-arrow-clockwise"></i> Refresh
                </button>
            </div>
        </div>

        <!-- Dynamic bookings go here -->
        <div id="bookingList"></div>

        <!-- No Bookings Message -->
        <div id="noBookings" class="text-center py-5" style="display:none;">
            <i class="bi bi-calendar-x" style="font-size: 4rem; color: #6c757d;"></i>
            <h4 class="mt-3">No Bookings Found</h4>
            <p class="text-muted">You haven't made any bookings yet.</p>
            <a href="searchflight.html" class="btn btn-primary">
                <i class="bi bi-search me-1"></i> Search Flights
            </a>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer text-center py-3 bg-light border-top">
        <div class="container">
            <p class="mb-0">© 2025 BlueHorizon Air Services | Flight Booking System</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="bookinghistory.js"></script>
    <script src="login.js"></script>

    <script>
        // Check if user is logged in
        document.addEventListener('DOMContentLoaded', function () {
            const loggedInUser = localStorage.getItem("user");
            if (loggedInUser) {
                try {
                    const user = JSON.parse(loggedInUser);
                    if (user.userID) {
                        // Update the global userID in bookinghistory.js
                        window.userID = user.userID;
                        if (typeof setUserID === 'function') {
                            setUserID(user.userID);
                        }
                    }
                } catch (e) {
                    console.error("Error parsing user data:", e);
                }
            }
        });
    </script>
</body>

</html>
