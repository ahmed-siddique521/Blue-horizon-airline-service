<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Book Flight</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Existing CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <img src="logo2.png" alt="Logo" class="logo-img">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
                BlueHorizon Air Services
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="searchflight.html">Flights</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="bookings.html">Bookings</a>
                    </li>
                    <!-- Dynamic login/logout buttons -->
                    <li class="nav-item" id="loginNav">
                        <a class="nav-link" href="login.html">Login</a>
                    </li>
                    <li class="nav-item" id="registerNav">
                        <a class="nav-link" href="register.html">Register</a>
                    </li>
                    <!-- Logout button will be inserted here by JavaScript -->
                    <li class="nav-item">
                        <a class="nav-link" href="admin-login.html">Admin Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- BOOKING SECTION -->
    <section class="container my-5">

        <h3 class="mb-4">Booking Details</h3>

        <!-- FLIGHT SUMMARY -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h5 class="card-title">Selected Flight</h5>
                <p><strong>Flight:</strong> <span id="flightNumber"></span></p>
                <p><strong>Route:</strong> <span id="route"></span></p>
                <p><strong>Date:</strong> <span id="flightDate"></span></p>
                <p><strong>Price:</strong> PKR <span id="flightPrice"></span></p>

            </div>
        </div>

        <!-- PASSENGER DETAILS -->
        <div class="card shadow-sm">
            <div class="card-body">

                <h5 class="card-title mb-3">Passenger Information</h5>

                <form>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="fullName" placeholder="Enter full name">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">CNIC / Passport</label>
                            <input type="text" class="form-control" id="cnic" placeholder="Enter CNIC or Passport">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Gender</label>
                            <select class="form-select" id="gender">
                                <option selected>Select</option>
                                <option>Male</option>
                                <option>Female</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Date of Birth</label>
                            <input type="date" class="form-control" id="dob">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Contact Number</label>
                            <input type="text" class="form-control" id="contact">
                        </div>
                    </div>

                    <div class="text-end">
                        <button type="button" class="btn btn-primary" onclick="savePassenger()">
                            Select Seat
                        </button>

                    </div>

                </form>

            </div>
        </div>

    </section>

    <!-- FOOTER -->
    <footer class="footer text-center">
        <div class="container">
            <p class="mb-0">© 2025 Flight Booking System</p>
        </div>
    </footer>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="bookings.js"></script>
    <script src="login.js"></script>


</body>

</html>
