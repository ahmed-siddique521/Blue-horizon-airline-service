<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Search Flights | BlueHorizon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <!-- LOGO + BRAND -->
            <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
                <img src="logo2.png" alt="Logo" class="logo-img me-2">
                BlueHorizon Air Services
            </a>

            <!-- TOGGLER -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- NAV LINKS -->
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="searchflight.html">Flights</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="bookings.html">Bookings</a>
                    </li>
                    <!-- Dynamic login/logout buttons -->
                    <li class="nav-item" id="loginNav">
                        <a class="nav-link" href="login.html">Login</a>
                    </li>
                    <li class="nav-item" id="registerNav">
                        <a class="nav-link" href="register.html">Register</a>
                    </li>
                    <!-- Logout button will be inserted here by JavaScript -->
                    <li class="nav-item">
                        <a class="nav-link" href="admin-login.html">Admin Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- SEARCH CARD -->
    <section class="container search-card">
        <div class="card shadow-lg">
            <div class="card-body p-4">
                <h4 class="text-center mb-4">Search Flights</h4>

                <form id="searchForm" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">From</label>
                        <input type="text" id="departureCity" class="form-control" placeholder="Departure City">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">To</label>
                        <input type="text" id="destinationCity" class="form-control" placeholder="Destination City">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Date</label>
                        <input type="date" id="date" class="form-control">
                    </div>

                    <div class="col-md-1 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-search"></i> Search
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!-- SEARCH INFO -->
    <section class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold mb-2" id="pageTitle">Available Flights</h3>
                <p class="text-muted" id="searchInfo">
                    Showing all available flights
                </p>
            </div>
            <button class="btn btn-outline-primary" onclick="loadAllFlights()">
                <i class="bi bi-arrow-clockwise"></i> Show All Flights
            </button>
        </div>
    </section>

    <!-- RESULTS -->
    <section class="container mb-5">
        <div id="results"></div>
        <div id="loading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3">Loading flights...</p>
        </div>
        <div id="noResults" class="text-center py-5" style="display: none;">
            <i class="bi bi-airplane text-muted" style="font-size: 3rem;"></i>
            <h4 class="mt-3">No flights found</h4>
            <p class="text-muted">Try adjusting your search criteria</p>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer text-center py-3 bg-light">
        <div class="container">
            <p class="mb-0">© 2025 BlueHorizon Air Services</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Your scripts -->
    <script src="searchflight.js"></script>
    <script src="login.js"></script>
</body>

</html>
