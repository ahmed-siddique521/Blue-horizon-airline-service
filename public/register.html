<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register | BlueHorizon Air Services</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <img src="logo2.png" alt="" class="logo-img">
            <a class="navbar-brand fw-bold" href="#">BlueHorizon Air Services</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link " href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="searchflight.html">Flights</a></li>
                    <li class="nav-item"><a class="nav-link" href="bookings.html">Bookings</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html" id="loginNav">Login</a></li>
                    <li class="nav-item"><a class="nav-link active" href="register.html" id="registerNav">Register</a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="admin-login.html">Admin Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- REGISTER SECTION -->
    <section class="auth-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="auth-card">
                        <h3 class="text-center mb-4">Create Account</h3>

                        <form id="registerForm">

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label>First Name</label>
                                    <input type="text" id="firstName" class="form-control" placeholder="First Name"
                                        required>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label>Last Name</label>
                                    <input type="text" id="lastName" class="form-control" placeholder="Last Name"
                                        required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label>Email</label>
                                <input type="email" id="email" class="form-control" placeholder="Email Address"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label>Password</label>
                                <input type="password" id="password" class="form-control" placeholder="Password"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label>Confirm Password</label>
                                <input type="password" id="confirmPassword" class="form-control"
                                    placeholder="Confirm Password" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Register</button>
                        </form>


                        <p class="text-center mt-3">
                            Already have an account?
                            <a href="login.html">Login</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="text-center py-3">
        <p class="mb-0">© 2025 BlueHorizon Air Services | Database Project</p>
    </footer>



    <script src="register.js"> </script>
</body>

</html>
